# Append to /etc/caddy/Caddyfile on gabs-iris-bank (it already holds the
# celeb/langcache/irisbank.platformengineer.io blocks), then:
#   sudo cp /etc/caddy/Caddyfile /etc/caddy/Caddyfile.bak.$(date +%Y%m%d-%H%M%S)
#   sudo caddy validate --config /etc/caddy/Caddyfile
#   sudo systemctl reload caddy
# Do this ONLY after the apex A record resolves (platformengineer.io -> 34.136.162.94),
# otherwise Caddy burns Let's Encrypt rate limits on failed challenges.

platformengineer.io {
    encode gzip zstd
    reverse_proxy 127.0.0.1:8088
}

www.platformengineer.io {
    redir https://platformengineer.io{uri} permanent
}
